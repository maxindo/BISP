<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotspot Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        .error-message {
            padding: 15px 20px;
            margin-bottom: 20px;
            background-color: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
            border-radius: 4px;
            display: none;
            animation: slideDown 0.3s ease;
        }
        .error-message.show {
            display: block;
        }
        .error-message.danger {
            background-color: #f8d7da;
            color: #721c24;
            border-left-color: #dc3545;
        }
        .error-message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border-left-color: #17a2b8;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 Hotspot Login</h1>
            <p>Masukkan username dan password untuk mengakses internet</p>
        </div>
        
        <!-- Error Message Container -->
        <div id="errorMessage" class="error-message">
            <strong>⚠️</strong> <span id="errorText"></span>
        </div>
        
        <form method="post" action="/login">
            <input type="hidden" name="dst" value="$dst">
            <input type="hidden" name="popup" value="true">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" placeholder="Masukkan username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Masukkan password" required>
            </div>
            <button type="submit">Login</button>
        </form>
        
        <div class="footer">
            <p>&copy; 2025 Hotspot Service. All rights reserved.</p>
        </div>
    </div>
    
    <script>
        // Function untuk menampilkan Reply-Message dari RADIUS
        (function() {
            var urlParams = new URLSearchParams(window.location.search);
            var error = urlParams.get('error');
            var message = urlParams.get('message');
            var errorText = '';
            var errorType = 'danger'; // default: danger (red)
            
            // Prioritas 1: message parameter (Reply-Message dari RADIUS)
            if (message) {
                errorText = decodeURIComponent(message);
                
                // Tentukan tipe error berdasarkan pesan
                if (errorText.toLowerCase().includes('durasi') || 
                    errorText.toLowerCase().includes('habis') ||
                    errorText.toLowerCase().includes('expired')) {
                    errorType = 'warning'; // yellow/orange
                } else if (errorText.toLowerCase().includes('masa berlaku')) {
                    errorType = 'info'; // blue
                }
            } 
            // Prioritas 2: error code dari Mikrotik
            else if (error) {
                var errorMap = {
                    'invalid-user': { msg: 'Username atau password salah', type: 'danger' },
                    'invalid-password': { msg: 'Username atau password salah', type: 'danger' },
                    'radius-reject': { msg: 'Akses ditolak oleh server', type: 'danger' },
                    'radius-timeout': { msg: 'Server tidak merespons. Silakan coba lagi.', type: 'warning' },
                    'radius-failed': { msg: 'Autentikasi gagal', type: 'danger' }
                };
                
                var errorInfo = errorMap[error] || { msg: 'Login gagal. Silakan coba lagi.', type: 'danger' };
                errorText = errorInfo.msg;
                errorType = errorInfo.type;
            }
            
            // Tampilkan error message jika ada
            if (errorText) {
                var errorDiv = document.getElementById('errorMessage');
                var errorSpan = document.getElementById('errorText');
                
                errorSpan.textContent = errorText;
                errorDiv.classList.add('show', errorType);
            }
        })();
    </script>
</body>
</html>
